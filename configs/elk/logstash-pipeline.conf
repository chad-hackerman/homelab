# Logstash Pipeline Configuration
# /etc/logstash/conf.d/homelab.conf
# Ingests Windows Event Logs (Winlogbeat), Syslog, and Security Onion alerts

input {
  # Winlogbeat from Windows Server 2022
  beats {
    port => 5044
    tags => ["windows"]
  }

  # Syslog from Ubuntu Server and pfSense
  syslog {
    port => 514
    tags => ["syslog"]
  }

  # Security Onion alerts via Elasticsearch input
  elasticsearch {
    hosts => ["10.0.10.30:9200"]
    index => "so-*"
    query => '{ "query": { "range": { "@timestamp": { "gte": "now-1m" } } } }'
    tags => ["security_onion"]
    schedule => "* * * * *"
  }
}

filter {
  # ── Windows Event Log processing ──────────────────────────────────────────
  if "windows" in [tags] {
    mutate {
      add_field => { "log_source" => "windows" }
    }

    # Map common Windows Event IDs to human-readable names
    if [event][code] == 4624 {
      mutate { add_field => { "event_description" => "Successful Logon" } }
    } else if [event][code] == 4625 {
      mutate { add_field => { "event_description" => "Failed Logon" } }
    } else if [event][code] == 4648 {
      mutate { add_field => { "event_description" => "Logon with Explicit Credentials" } }
    } else if [event][code] == 4672 {
      mutate { add_field => { "event_description" => "Special Privileges Assigned" } }
    } else if [event][code] == 4688 {
      mutate { add_field => { "event_description" => "New Process Created" } }
    } else if [event][code] == 4698 {
      mutate { add_field => { "event_description" => "Scheduled Task Created" } }
    } else if [event][code] == 4720 {
      mutate { add_field => { "event_description" => "User Account Created" } }
    } else if [event][code] == 4768 {
      mutate { add_field => { "event_description" => "Kerberos TGT Requested" } }
    } else if [event][code] == 4769 {
      mutate { add_field => { "event_description" => "Kerberos Service Ticket Requested" } }
    } else if [event][code] == 4771 {
      mutate { add_field => { "event_description" => "Kerberos Pre-Auth Failed" } }
    }
  }

  # ── Syslog processing ─────────────────────────────────────────────────────
  if "syslog" in [tags] {
    mutate {
      add_field => { "log_source" => "syslog" }
    }

    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
      }
    }

    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
    }
  }

  # ── Security Onion alert processing ───────────────────────────────────────
  if "security_onion" in [tags] {
    mutate {
      add_field => { "log_source" => "security_onion" }
    }
  }

  # ── GeoIP enrichment for external IPs ────────────────────────────────────
  if [source][ip] and [source][ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.)/ {
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"
    }
  }

  # ── Remove noisy/low-value fields ────────────────────────────────────────
  mutate {
    remove_field => ["agent.ephemeral_id", "ecs.version", "input.type"]
  }
}

output {
  elasticsearch {
    hosts => ["10.0.10.20:9200"]
    index => "homelab-logs-%{+YYYY.MM.dd}"
  }

  # Debug output — disable in production
  # stdout { codec => rubydebug }
}
